<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<title>Login - Fitness PRO</title>

<style>

body{
background:#111827;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login{
width:90%;
max-width:350px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:5px;
border:none;
border-radius:8px;
background:#6c5ce7;
color:white;
}

</style>

</head>

<body>

<div class="login">

<h2>Fitness PRO</h2>

<input type="email" id="email" placeholder="Seu Gmail">

<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">Entrar</button>

<button onclick="cadastrar()">Criar Conta</button>

</div>
<script type="module">

// Import Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// Config do seu Firebase
const firebaseConfig = {
  apiKey: "AIzaSyAaM0TXHNIyHVMJ5FeW_3OjAYvLwmuGvps",
  authDomain: "fitness-pro-d0838.firebaseapp.com",
  projectId: "fitness-pro-d0838",
  storageBucket: "fitness-pro-d0838.firebasestorage.app",
  messagingSenderId: "892995222412",
  appId: "1:892995222412:web:2df84b4ef355c84fb274a9",
  measurementId: "G-EXQ0B0PS1L"
};

// Iniciar Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Login
window.login = function(){

let email = document.getElementById("email").value
let senha = document.getElementById("senha").value

signInWithEmailAndPassword(auth, email, senha)
.then(() => {

alert("Login feito com sucesso")
window.location.href = "index.html"

})
.catch((error) => {

alert(error.message)

});

}

// Cadastro
window.cadastrar = function(){

let email = document.getElementById("email").value
let senha = document.getElementById("senha").value

createUserWithEmailAndPassword(auth, email, senha)
.then(() => {

alert("Conta criada com sucesso")

})
.catch((error) => {

alert(error.message)

});

}

</script>
