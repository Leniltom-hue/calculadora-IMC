<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Fitness PRO</title>

<style>
body{
  background:#111827;
  color:white;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.login{
  width:90%;
  max-width:350px;
}

h2{
  font-size:28px;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border-radius:10px;
  border:none;
  font-size:16px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  margin-top:6px;
  border:none;
  border-radius:10px;
  background:#6c5ce7;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:last-of-type{
  background:#5741d9;
}

.msg{
  margin-top:12px;
  font-size:14px;
  color:#cbd5e1;
}
</style>
</head>

<body>

<div class="login">
  <h2>Fitness PRO</h2>

  <input type="email" id="email" placeholder="Seu Gmail">
  <input type="password" id="senha" placeholder="Senha">

  <button onclick="login()">Entrar</button>
  <button onclick="cadastrar()">Criar Conta</button>

  <div class="msg" id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAaM0TXHNIyHVMJ5FeW_3OjAYvLwmuGvps",
  authDomain: "fitness-pro-d0838.firebaseapp.com",
  projectId: "fitness-pro-d0838",
  storageBucket: "fitness-pro-d0838.firebasestorage.app",
  messagingSenderId: "892995222412",
  appId: "1:892995222412:web:2df84b4ef355c84fb274a9",
  measurementId: "G-EXQ0B0PS1L"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function mostrar(msg){
  document.getElementById("msg").textContent = msg;
}

window.login = function(){
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value;

  if (!email || !senha){
    mostrar("Preencha email e senha.");
    return;
  }

  signInWithEmailAndPassword(auth, email, senha)
    .then(() => {
      localStorage.setItem("logado", "sim");
      mostrar("Login feito com sucesso.");
      window.location.replace("./index.html");
    })
    .catch((error) => {
      mostrar("Erro: " + error.message);
    });
};

window.cadastrar = function(){
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value;

  if (!email || !senha){
    mostrar("Preencha email e senha.");
    return;
  }

  createUserWithEmailAndPassword(auth, email, senha)
    .then(() => {
      mostrar("Conta criada com sucesso. Agora clique em Entrar.");
    })
    .catch((error) => {
      mostrar("Erro: " + error.message);
    });
};
</script>

</body>
</html>
