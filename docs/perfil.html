<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil - Fitness PRO</title>

  <style>
    :root{
      --bg:#0b1220;
      --card:#111827;
      --text:#f8fafc;
      --muted:#94a3b8;
      --primary:#6c5ce7;
      --border:rgba(255,255,255,.10);
      --shadow:0 20px 60px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(168,85,247,.20), transparent 30%),
        radial-gradient(circle at bottom left, rgba(59,130,246,.16), transparent 28%),
        linear-gradient(180deg,#020617 0%,#0f172a 45%,#1e1b4b 100%);
      color:var(--text);
      min-height:100vh;
      padding:18px;
    }

    .page{
      width:min(760px, 100%);
      margin:0 auto;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
    }

    .titleBox h1{
      margin:0;
      font-size:28px;
      font-weight:900;
    }

    .titleBox p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .btn{
      border:none;
      background:var(--primary);
      color:white;
      padding:12px 14px;
      border-radius:14px;
      font-weight:800;
      cursor:pointer;
    }

    .btn.secondary{
      background:rgba(255,255,255,.06);
      border:1px solid var(--border);
      color:white;
    }

    .card{
      background:rgba(255,255,255,.05);
      border:1px solid var(--border);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:18px;
      backdrop-filter:blur(10px);
    }

    .profileHero{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:18px;
    }

    .avatar{
      width:72px;
      height:72px;
      border-radius:22px;
      background:linear-gradient(135deg,#2563eb,#7c3aed);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      font-weight:900;
      color:#fff;
      flex-shrink:0;
    }

    .heroText h2{
      margin:0;
      font-size:22px;
    }

    .heroText p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    @media (max-width: 640px){
      .grid{
        grid-template-columns:1fr;
      }
    }

    label{
      display:block;
      margin:0 0 6px;
      font-size:13px;
      font-weight:800;
      color:#cbd5e1;
    }

    input, select, textarea{
      width:100%;
      padding:13px 14px;
      border-radius:14px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      color:var(--text);
      font-size:15px;
      outline:none;
    }

    textarea{
      min-height:100px;
      resize:vertical;
    }

    .full{
      grid-column:1 / -1;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .msg{
      margin-top:14px;
      color:#cbd5e1;
      font-size:14px;
    }
  </style>
</head>
<body>

  <script>
    if (!localStorage.getItem("logado")) {
      window.location.href = "./login.html";
    }
  </script>

  <div class="page">
    <div class="topbar">
      <div class="titleBox">
        <h1>Meu Perfil</h1>
        <p>Seus dados pessoais e físicos</p>
      </div>

      <button class="btn secondary" onclick="window.location.href='./index.html'">← Voltar</button>
    </div>

    <div class="card">
      <div class="profileHero">
        <div class="avatar" id="avatarBox">👤</div>
        <div class="heroText">
          <h2 id="perfilTitulo">Seu perfil</h2>
          <p id="perfilSub">Preencha seus dados para personalizar o app.</p>
        </div>
      </div>

      <div class="grid">
        <div>
          <label for="pfNome">Nome completo</label>
          <input id="pfNome" placeholder="Seu nome">
        </div>

        <div>
          <label for="pfIdade">Idade</label>
          <input id="pfIdade" type="number" placeholder="Ex: 26">
        </div>

        <div>
          <label for="pfSexo">Sexo</label>
          <select id="pfSexo">
            <option value="">Selecione</option>
            <option value="Masculino">Masculino</option>
            <option value="Feminino">Feminino</option>
          </select>
        </div>

        <div>
          <label for="pfTipoSangue">Tipo sanguíneo</label>
          <select id="pfTipoSangue">
            <option value="">Selecione</option>
            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>AB+</option>
            <option>AB-</option>
            <option>O+</option>
            <option>O-</option>
          </select>
        </div>

        <div>
          <label for="pfAltura">Altura (m)</label>
          <input id="pfAltura" type="number" step="0.01" placeholder="Ex: 1.66">
        </div>

        <div>
          <label for="pfPeso">Peso (kg)</label>
          <input id="pfPeso" type="number" step="0.1" placeholder="Ex: 64">
        </div>

        <div>
          <label for="pfObjetivo">Objetivo</label>
          <select id="pfObjetivo">
            <option value="">Selecione</option>
            <option>Ganhar massa</option>
            <option>Emagrecer</option>
            <option>Manter</option>
            <option>Definição</option>
          </select>
        </div>

        <div>
          <label for="pfTelefone">Telefone</label>
          <input id="pfTelefone" placeholder="Seu telefone">
        </div>

        <div class="full">
          <label for="pfObs">Observações</label>
          <textarea id="pfObs" placeholder="Alergias, lesões, restrições, observações..."></textarea>
        </div>
      </div>

      <div class="actions">
        <button class="btn" id="pfSalvar" type="button">Salvar perfil</button>
        <button class="btn secondary" id="pfCarregar" type="button">Carregar perfil</button>
        <button class="btn secondary" id="pfLimpar" type="button">Limpar</button>
      </div>

      <div class="msg" id="pfMsg"></div>
    </div>
  </div>

  <script>
    const LS_PROFILE = "perfil_usuario_v1";

    const perfil = {
      nome: document.getElementById("pfNome"),
      idade: document.getElementById("pfIdade"),
      sexo: document.getElementById("pfSexo"),
      tipoSangue: document.getElementById("pfTipoSangue"),
      altura: document.getElementById("pfAltura"),
      peso: document.getElementById("pfPeso"),
      objetivo: document.getElementById("pfObjetivo"),
      telefone: document.getElementById("pfTelefone"),
      obs: document.getElementById("pfObs"),
      salvar: document.getElementById("pfSalvar"),
      carregar: document.getElementById("pfCarregar"),
      limpar: document.getElementById("pfLimpar"),
      msg: document.getElementById("pfMsg"),
      titulo: document.getElementById("perfilTitulo"),
      sub: document.getElementById("perfilSub"),
      avatar: document.getElementById("avatarBox")
    };

    function atualizarCabecalho(nome){
      if (nome && nome.trim()) {
        perfil.titulo.textContent = nome;
        perfil.sub.textContent = "Perfil pessoal salvo neste dispositivo.";
        perfil.avatar.textContent = nome.trim().charAt(0).toUpperCase();
      } else {
        perfil.titulo.textContent = "Seu perfil";
        perfil.sub.textContent = "Preencha seus dados para personalizar o app.";
        perfil.avatar.textContent = "👤";
      }
    }

    function salvarPerfil(){
      const dados = {
        nome: perfil.nome.value.trim(),
        idade: perfil.idade.value.trim(),
        sexo: perfil.sexo.value,
        tipoSangue: perfil.tipoSangue.value,
        altura: perfil.altura.value.trim(),
        peso: perfil.peso.value.trim(),
        objetivo: perfil.objetivo.value,
        telefone: perfil.telefone.value.trim(),
        obs: perfil.obs.value.trim()
      };

      localStorage.setItem(LS_PROFILE, JSON.stringify(dados));
      atualizarCabecalho(dados.nome);
      perfil.msg.textContent = "Perfil salvo com sucesso ✅";
    }

    function carregarPerfil(){
      const dados = JSON.parse(localStorage.getItem(LS_PROFILE) || "{}");

      perfil.nome.value = dados.nome || "";
      perfil.idade.value = dados.idade || "";
      perfil.sexo.value = dados.sexo || "";
      perfil.tipoSangue.value = dados.tipoSangue || "";
      perfil.altura.value = dados.altura || "";
      perfil.peso.value = dados.peso || "";
      perfil.objetivo.value = dados.objetivo || "";
      perfil.telefone.value = dados.telefone || "";
      perfil.obs.value = dados.obs || "";

      atualizarCabecalho(dados.nome || "");
      perfil.msg.textContent = dados.nome ? "Perfil carregado ✅" : "Nenhum perfil salvo ainda.";
    }

    function limparPerfil(){
      perfil.nome.value = "";
      perfil.idade.value = "";
      perfil.sexo.value = "";
      perfil.tipoSangue.value = "";
      perfil.altura.value = "";
      perfil.peso.value = "";
      perfil.objetivo.value = "";
      perfil.telefone.value = "";
      perfil.obs.value = "";
      localStorage.removeItem(LS_PROFILE);
      atualizarCabecalho("");
      perfil.msg.textContent = "Perfil apagado.";
    }

    perfil.salvar.addEventListener("click", salvarPerfil);
    perfil.carregar.addEventListener("click", carregarPerfil);
    perfil.limpar.addEventListener("click", limparPerfil);

    carregarPerfil();
  </script>
</body>
</html>
